name: Investment Monitor

on:
  schedule:
    # 10 min after market open — 9:40 AM EST (2:40 PM UTC / 8:40 AM CST)
    - cron: '40 14 * * 1-5'
    # Midday — 12 PM CST (6 PM UTC / 1 PM EST)
    - cron: '0 18 * * 1-5'
    # 30 min before close — 3:30 PM EST (8:30 PM UTC / 2:30 PM CST)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Market open (9:40 AM) — full digest
        if: github.event.schedule == '40 14 * * 1-5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor.py digest

      - name: Midday & close — price check only (no digest)
        if: github.event.schedule != '40 14 * * 1-5' && github.event.schedule != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor.py check

      - name: Upload state
        uses: actions/upload-artifact@v4
        with:
          name: alert-state
          path: alert_state.json
          retention-days: 30
