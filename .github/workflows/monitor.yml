name: Investment Monitor

on:
  schedule:
    # Morning digest — 7 AM EST (12 PM UTC)
    - cron: '0 12 * * 1-5'
    # Hourly checks — 8:30 AM, 10 AM, 12 PM, 2 PM, 3 PM EST (13:30, 15, 17, 19, 20 UTC)
    - cron: '30 13 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '0 20 * * 1-5'
    # Afternoon digest — 4 PM EST (9 PM UTC)
    - cron: '0 21 * * 1-5'
    # After-hours crypto check — 10 PM EST (3 AM UTC next day)
    - cron: '0 3 * * 2-6'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Run price check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor.py check

      - name: Run daily digest (if morning)
        if: github.event.schedule == '0 12 * * 1-5' || github.event.schedule == '0 21 * * 1-5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor.py digest

      - name: Upload state
        uses: actions/upload-artifact@v4
        with:
          name: alert-state
          path: alert_state.json
          retention-days: 30
