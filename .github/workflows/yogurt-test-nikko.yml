name: Yogurt Stock Monitor — One-shot Nikko's test

# Fires exactly once when this file is added/modified on main.
# Delete this file after the test run.
# rerun-bump: 5 (longer hydration + dump full visible text)
on:
  push:
    paths:
      - '.github/workflows/yogurt-test-nikko.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Check Nikko's yogurt stock (one-shot, debug)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOGURT_URL: https://www.pricesmart.com/es-cr/producto/nikkos-yogurt-griego-natural-950-g-2-1-lb-501581/501581
          YOGURT_NAME: "Nikko's Greek Yogurt 950g (one-shot test)"
          DEBUG: "1"
        run: |
          python yogurt_monitor.py check

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nikko-debug
          path: |
            page_debug.html
            page_debug.txt
            page_debug.png
          retention-days: 7
          if-no-files-found: warn
