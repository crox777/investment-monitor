name: Yogurt Stock Monitor

on:
  schedule:
    # Once daily — 9:00 AM Costa Rica time (15:00 UTC, GMT-6)
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright requests stripe
          playwright install --with-deps chromium

      - name: Check yogurt stock
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python yogurt_monitor.py check

      - name: Commit status.json (for the public web page)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update status.json [skip ci]"
            git push
          else
            echo "No status changes to commit."
          fi

      - name: Send daily digest to Stripe subscribers
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python digest.py

      - name: Upload state
        uses: actions/upload-artifact@v4
        with:
          name: yogurt-state
          path: yogurt_state.json
          retention-days: 30
          if-no-files-found: ignore
